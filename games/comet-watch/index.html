<!-- BOB:BODY -->
<!-- template_id: arcade_dodge
     Slots filled by HobbyStudio from the brief JSON.
     Comet Watch Spot the wanderer before the sky gets crowded. #081229 "#7DE3FF"
     "#FF6B6B" "Collect the glowing comet fragments" Fragments: 0 | Time: 30 "#081229"
-->
<div class="game-wrap">
  <p class="game-tagline">Spot the wanderer before the sky gets crowded.</p>
  <canvas id="game" width="480" height="320" aria-label="Comet Watch"></canvas>
  <p class="game-hint">Arrow keys or WASD to move. Survive.</p>
  <p class="game-hud" id="hud">Fragments: 0 | Time: 30</p>
</div>
<style>
  .game-wrap { max-width: 480px; }
  .game-tagline { color: var(--muted); margin: 0 0 0.75rem; }
  #game {
    display: block;
    width: 100%;
    max-width: 480px;
    background: #081229;
    border: 1px solid var(--rule);
    border-radius: 4px;
    touch-action: none;
  }
  .game-hint, .game-hud { color: var(--muted); font-size: 0.9rem; }
</style>
<script>
(function () {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const hud = document.getElementById("hud");
  const W = canvas.width, H = canvas.height;
  const PLAYER = "#7DE3FF";
  const ENEMY = "#FF6B6B";
  const GOAL = "Collect the glowing comet fragments";
  const BG = "#081229";

  let x = W / 2, y = H / 2, r = 12;
  let score = 0, alive = true, t = 0;
  const keys = Object.create(null);
  const foes = [];

  function spawn() {
    const edge = Math.floor(Math.random() * 4);
    let fx, fy, vx, vy;
    const speed = 1.2 + Math.random() * 1.8 + score * 0.05;
    if (edge === 0) { fx = Math.random() * W; fy = -10; vx = (Math.random() - 0.5) * 2; vy = speed; }
    else if (edge === 1) { fx = W + 10; fy = Math.random() * H; vx = -speed; vy = (Math.random() - 0.5) * 2; }
    else if (edge === 2) { fx = Math.random() * W; fy = H + 10; vx = (Math.random() - 0.5) * 2; vy = -speed; }
    else { fx = -10; fy = Math.random() * H; vx = speed; vy = (Math.random() - 0.5) * 2; }
    foes.push({ x: fx, y: fy, vx, vy, r: 8 + Math.random() * 6 });
  }

  window.addEventListener("keydown", (e) => { keys[e.key.toLowerCase()] = true; });
  window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

  function step() {
    if (!alive) return;
    t += 1;
    if (t % 40 === 0) spawn();
    let dx = 0, dy = 0;
    if (keys["arrowleft"] || keys["a"]) dx -= 1;
    if (keys["arrowright"] || keys["d"]) dx += 1;
    if (keys["arrowup"] || keys["w"]) dy -= 1;
    if (keys["arrowdown"] || keys["s"]) dy += 1;
    if (dx || dy) {
      const len = Math.hypot(dx, dy) || 1;
      x += (dx / len) * 3.2;
      y += (dy / len) * 3.2;
      x = Math.max(r, Math.min(W - r, x));
      y = Math.max(r, Math.min(H - r, y));
    }
    for (const f of foes) {
      f.x += f.vx; f.y += f.vy;
      if (Math.hypot(f.x - x, f.y - y) < f.r + r) {
        alive = false;
        hud.textContent = "Ouch. Score " + score + ". Refresh to retry.";
      }
    }
    for (let i = foes.length - 1; i >= 0; i--) {
      const f = foes[i];
      if (f.x < -40 || f.x > W + 40 || f.y < -40 || f.y > H + 40) foes.splice(i, 1);
    }
    if (alive && t % 30 === 0) {
      score += 1;
      hud.textContent = GOAL + " — score: " + score;
    }
  }

  function draw() {
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = PLAYER;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = ENEMY;
    for (const f of foes) {
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.fill();
    }
  }

  function loop() {
    step();
    draw();
    requestAnimationFrame(loop);
  }
  hud.textContent = GOAL + " — score: 0";
  loop();
})();
</script>
